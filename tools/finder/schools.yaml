# schools.yaml — canonical school list for the CDS Finder
#
# Each entry is a school the finder will attempt to discover, download, and
# archive a CDS PDF for. The finder uses `domain` + the URL pattern fallback
# ladder (see seed_urls.md) to locate the current-year file, unless
# `cds_url_hint` provides a known-good starting point.
#
# Fields:
#   id:                  kebab-case slug, used as the Storage path key
#   name:                display name
#   domain:              primary .edu domain (no protocol, no trailing slash)
#   ipeds_id:            IPEDS Unit ID (6 digits) — the stable join key used
#                        for any future College Scorecard or IPEDS integration.
#                        Must be unique across every entry in this file.
#   cds_url_hint:        optional last-known URL or IR page for the CDS
#   scrape_policy:       finder-side policy, not a document status. Values:
#                          active           — try to discover and archive
#                          verified_absent  — known non-publisher; skip
#                          verified_partial — publishes but omits sections; still scrape
#                          unknown          — unclear; scrape and flag results
#                        This is distinct from cds_documents.participation_status
#                        in the database, which records the actual state of each
#                        document at runtime (published / withdrawn / not_yet_found).
#   sub_institutions:    optional list if the school publishes >1 CDS per year.
#                        Each entry needs `id` (becomes the sub_institutional
#                        slug in the DB) and `label` (human-readable).
#   notes:               optional free-text
#
# Sourced from: tools/finder/seed_urls.md (pbworks wiki + Gemini research).
# IPEDS IDs verified against NCES IPEDS institution profiles.
# Add new schools by appending to this file and opening a PR.

