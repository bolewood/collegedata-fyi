    label: First-year White
    expected: "484"
    capture: 'White[^\n]*?\b(484)\b'

  - id: b2_fy_asian
    section: B2
    label: First-year Asian
    expected: "150"
    capture: 'Asian[^\n]*?\b(150)\b'

  - id: b2_fy_total
    section: B2
    label: First-year total
    expected: "1182"
    capture: 'TOTAL[^\n]*?\b(1182)\b'

  # ------------------------- B3 Degrees -------------------------
  - id: b3_bachelors
    section: B3
    label: Bachelor's degrees
    expected: "1156"
    capture: "Bachelor[^\\n]*?\\b(1156)\\b"

  - id: b3_masters
    section: B3
    label: Master's degrees
    expected: "773"
    capture: "Master[^\\n]*?\\b(773)\\b"

  - id: b3_doctoral_research
    section: B3
    label: Doctoral research/scholarship
    expected: "104"
    capture: 'research[^\n]*?\b(104)\b'

  - id: b3_doctoral_professional
    section: B3
    label: Doctoral professional practice
    expected: "91"
    capture: 'professional[^\n]*?\b(91)\b'

  # ------------------------- C1 Applications (CRITICAL) -------------------------
  - id: c1_applied_men
    section: C1
    label: First-year men who applied
    expected: "15153"
    capture: 'men who applied[^\n]*?\b(15153)\b'
    critical: true

  - id: c1_applied_women
    section: C1
    label: First-year women who applied
    expected: "15812"
    capture: 'women who applied[^\n]*?\b(15812)\b'
    critical: true

  - id: c1_applied_another
    section: C1
    label: First-year another gender who applied
    expected: "690"
    capture: 'another gender who applied[^\n]*?\b(690)\b'
    critical: true

  - id: c1_admitted_men
    section: C1
    label: First-year men who were admitted
