# Dartmouth College, CDS 2024-25 — ground truth
#
# Values transcribed from the source PDF on 2026-04-16.
# Do not update these values from a Docling run — always re-verify against the PDF.
#
# Note: C9 test score percentiles are not reported in this CDS (Dartmouth was
# test-optional for Fall 2024; C8F notes the policy ended for Fall 2025).
# C10 class rank is reported.

school: dartmouth
cds_year: "2024-25"
source_pdf: dartmouth-2024-25.pdf

fields:
  # ------------------------- B1 Enrollment -------------------------
  - id: b1_ft_firstyear_men
    section: B1
    label: Full-time first-year degree-seeking — men
    expected: "612"
    capture: 'first.{0,10}time.{0,40}first.{0,10}year.*?\b(612)\b'

  - id: b1_ft_firstyear_women
    section: B1
    label: Full-time first-year degree-seeking — women
    expected: "554"
    capture: '612\D+(554)'

  - id: b1_ft_firstyear_another
    section: B1
    label: Full-time first-year degree-seeking — another gender
    expected: "16"
    capture: '554\D+(16)\b'

  - id: b1_ft_total_ug_men
    section: B1
    label: Total full-time undergraduates — men
    expected: "2322"
    capture: '\b(2322)\b'

  - id: b1_ft_total_ug_women
    section: B1
    label: Total full-time undergraduates — women
    expected: "2158"
    capture: '\b(2158)\b'

  # ------------------------- B2 Race/ethnicity -------------------------
  - id: b2_fy_nonresident
    section: B2
    label: First-year nonresident
    expected: "170"
    capture: 'Nonresident[^\n]*?\b(170)\b'

  - id: b2_fy_hispanic
    section: B2
    label: First-year Hispanic/Latino
    expected: "130"
    capture: 'Hispanic[^\n]*?\b(130)\b'

  - id: b2_fy_white
