# Harvard University, CDS 2024-25 — ground-truth ID mapping
#
# Maps the homegrown ground-truth field IDs (b1_ft_firstyear_men, etc.)
# to canonical CDS question numbers from schemas/cds_schema_2025_26.json
# so score_tier4.py can join cleaner output to expected values.
#
# Note on cross-year schema drift (2024-25 → 2025-26):
#   - The 2024-25 template had "Men / Women / Another Gender / Unknown".
#     The 2025-26 schema has "Male / Female / Unknown". The Tier 4 cleaner
#     extracts men/women columns today; "another gender" values are not
#     yet mapped. Entries below for "another gender" fields map to the
#     nearest 2025-26 question number so the scorer reports them as
#     expected-but-missing rather than unmapped — that makes the coverage
#     gap visible.

school: harvard
cds_year: "2024-25"
source: "hand-built 2026-04-17 from schema + ground truth cross-reference"

mappings:
  # ── B1 Enrollment ──
  b1_ft_firstyear_men:     B.101
  b1_ft_firstyear_women:   B.126
  b1_ft_total_ug_men:      B.106
