name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".context/**"
  push:
    branches:
      - main
      - "santhonys/**"
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".context/**"
  workflow_dispatch:

jobs:
  python:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/ci-requirements.txt
      - name: Install Python test dependencies
        run: python -m pip install -r tools/ci-requirements.txt
      - name: Run browser projection tests
        run: python -m unittest tools.browser_backend.project_browser_data_test
      - name: Run Tier 4 cleaner tests
        run: python -m unittest discover -s tools/extraction_worker -p "test_*.py"

  migrations:
    # Spin up the local Supabase stack and apply every migration in
    # supabase/migrations/ via `supabase db reset`. Catches malformed
    # SQL, ordering bugs, and the kind of drift where a migration is
    # applied to prod from a feature branch but never lands on main —
    # the next contributor's fresh `supabase db reset` would fail on
    # whatever depended on the missing schema change. PRD 014's
    # canonical_field_equivalence.sql was exactly that scenario.
    #
    # Slow (~2-3 min for the docker pull + container boot) but uses the
    # canonical Supabase tooling so storage/auth/extensions schemas are
    # set up the way migrations expect.
    name: Migrations apply cleanly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase (DB only — skip heavy services)
        run: supabase start -x studio,imgproxy,inbucket,realtime,edge-runtime,vector,pgbouncer
      - name: Verify migrations applied via db reset
        run: supabase db reset --no-seed

  deno:
    name: Supabase function tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run Deno tests
        run: deno test --allow-env --allow-read supabase/functions/_shared/*.test.ts supabase/functions/browser-search/*.test.ts

  web:
    name: Next.js build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://api.collegedata.fyi"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzZHV3bXlndm1kb3pocHZ6YWl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk3NTksImV4cCI6MjA5MTY4NTc1OX0.fYZOIHyrOWzidgc-CVxWCY5Fe9pQk12-6YjDIS6y9qs"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Typecheck web app
        working-directory: web
        run: npm run typecheck
      - name: Build web app
        working-directory: web
        run: npm run build
