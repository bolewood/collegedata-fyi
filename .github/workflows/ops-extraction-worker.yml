name: Ops extraction worker

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum pending rows to process. GitHub-hosted runs are capped at 100."
        required: false
        default: "25"
      school:
        description: "Optional school_id filter."
        required: false
        default: ""
      document_ids:
        description: "Optional comma-separated cds_documents.id filter."
        required: false
        default: ""
      requeue_document_ids:
        description: "Optional comma-separated cds_documents.id values to mark extraction_pending before draining."
        required: false
        default: ""
      include_failed:
        description: "Retry failed rows as well as pending rows."
        type: boolean
        required: false
        default: false
      seed_projection_metadata:
        description: "Upsert projection metadata before refreshing browser rows."
        type: boolean
        required: false
        default: true
      low_field_threshold:
        description: "Field-count threshold for low-field docs in the summary."
        required: false
        default: "25"
      min_year_start:
        description: "Optional minimum CDS start year for targeted fresh-file drains, e.g. 2025."
        required: false
        default: ""
  schedule:
    # Small daily pending-row drain. Full corpus drains belong on manual
    # operator machines or a self-hosted runner, not regular hosted CI.
    - cron: "17 9 * * *"

concurrency:
  group: ops-extraction-worker
  cancel-in-progress: false

permissions:
  contents: read
  # issues: write is needed by the bot-challenge notification step,
  # which mints a GitHub issue per (school_id, cds_year) when the
  # archive flow detects a Cloudflare/Imperva challenge response.
  # See migration 20260505160000_archive_observability.sql for the
  # SQL view that powers the dedup check.
  issues: write

jobs:
  drain-pending:
    name: Drain pending extraction rows
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      INPUT_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '25' }}
      INPUT_SCHOOL: ${{ github.event_name == 'workflow_dispatch' && inputs.school || '' }}
      INPUT_DOCUMENT_IDS: ${{ github.event_name == 'workflow_dispatch' && inputs.document_ids || '' }}
      INPUT_REQUEUE_DOCUMENT_IDS: ${{ github.event_name == 'workflow_dispatch' && inputs.requeue_document_ids || '' }}
      INPUT_INCLUDE_FAILED: ${{ github.event_name == 'workflow_dispatch' && inputs.include_failed || false }}
      INPUT_SEED_PROJECTION_METADATA: ${{ github.event_name != 'workflow_dispatch' || inputs.seed_projection_metadata }}
      INPUT_LOW_FIELD_THRESHOLD: ${{ github.event_name == 'workflow_dispatch' && inputs.low_field_threshold || '25' }}
      INPUT_MIN_YEAR_START: ${{ github.event_name == 'workflow_dispatch' && inputs.min_year_start || '' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/extraction_worker/requirements.txt

      - name: Install extraction worker dependencies
        run: python -m pip install -r tools/extraction_worker/requirements.txt

      - name: Run bounded pending-row drain
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${SUPABASE_URL}" || -z "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY secrets are required." >&2
            exit 2
          fi

          if ! [[ "${INPUT_LIMIT}" =~ ^[0-9]+$ ]]; then
            echo "limit must be an integer" >&2
            exit 2
          fi
          if [[ "${INPUT_LIMIT}" -gt 100 ]]; then
            echo "GitHub-hosted ops runs are capped at --limit 100. Use a laptop or self-hosted runner for corpus drains." >&2
            exit 2
          fi
          if ! [[ "${INPUT_LOW_FIELD_THRESHOLD}" =~ ^[0-9]+$ ]]; then
            echo "low_field_threshold must be an integer" >&2
            exit 2
          fi
          if [[ -n "${INPUT_MIN_YEAR_START}" ]] && ! [[ "${INPUT_MIN_YEAR_START}" =~ ^[0-9]+$ ]]; then
            echo "min_year_start must be an integer when provided" >&2
            exit 2
          fi

          mkdir -p ops-summary
          {
            printf 'SUPABASE_URL=%s\n' "${SUPABASE_URL}"
            printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "${SUPABASE_SERVICE_ROLE_KEY}"
          } > .env.ops
          chmod 600 .env.ops

          if [[ -n "${INPUT_REQUEUE_DOCUMENT_IDS}" ]]; then
          python - <<'PY'
          import os
          from supabase import create_client

          url = os.environ["SUPABASE_URL"]
          key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          document_ids = [
              value.strip()
              for value in os.environ["INPUT_REQUEUE_DOCUMENT_IDS"].split(",")
              if value.strip()
          ]
          client = create_client(url, key)
          changed = 0
          for document_id in document_ids:
              result = (
                  client.table("cds_documents")
                  .update({"extraction_status": "extraction_pending"})
                  .eq("id", document_id)
                  .execute()
              )
              changed += len(result.data or [])
          print(f"Requeued {changed} document(s).")
          PY
          fi

          args=(
            --env .env.ops
            --limit "${INPUT_LIMIT}"
            --summary-json ops-summary/summary.json
            --low-field-threshold "${INPUT_LOW_FIELD_THRESHOLD}"
          )
          if [[ "${INPUT_SEED_PROJECTION_METADATA}" == "true" ]]; then
            args+=(--seed-projection-metadata)
          fi
          if [[ "${INPUT_INCLUDE_FAILED}" == "true" ]]; then
            args+=(--include-failed)
          fi
          if [[ -n "${INPUT_SCHOOL}" ]]; then
            args+=(--school "${INPUT_SCHOOL}")
          fi
          if [[ -n "${INPUT_DOCUMENT_IDS}" ]]; then
            args+=(--document-ids "${INPUT_DOCUMENT_IDS}")
          fi
          if [[ -n "${INPUT_MIN_YEAR_START}" ]]; then
            args+=(--min-year-start "${INPUT_MIN_YEAR_START}")
          fi

          python tools/extraction_worker/worker.py "${args[@]}" | tee ops-summary/worker.log

      - name: Add run summary
        if: always()
        shell: bash
        run: |
          if [[ -f ops-summary/summary.json ]]; then
            {
              echo "## Extraction worker"
              echo
              jq -r '"Processed: \(.processed_count)\nFailures: \(.failure_count)\nMean fields: \(.mean_fields // "n/a")\nLow-field docs: \(.low_field_docs | length)"' ops-summary/summary.json
              echo
              echo "### Extraction counts"
              jq -r '.extraction_counts | to_entries[]? | "- \(.key): \(.value)"' ops-summary/summary.json
              echo
              echo "### Projection counts"
              jq -r '.projection_counts | to_entries[]? | "- \(.key): \(.value)"' ops-summary/summary.json
              echo
              echo "### Low-field docs"
              jq -r '.low_field_docs[]? | "- \(.school_id) (\(.source_format)): \(.field_count) fields"' ops-summary/summary.json
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No summary.json was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extraction-worker-summary
          path: ops-summary/
          if-no-files-found: warn

      - name: Notify on bot-challenged documents
        # Notify the operator (via GitHub issues) about any document whose
        # source archive failed because a WAF returned a bot challenge.
        # Reads public.bot_challenged_documents (added by migration
        # 20260505160000_archive_observability.sql), creates one issue per
        # (school_id, cds_year), deduped by issue title so a daily run
        # that finds the same blocked docs won't spam.
        #
        # Runs only on the scheduled cron, not on workflow_dispatch — the
        # operator running an ad-hoc dispatch already knows the state.
        # always() so a failed extraction step doesn't suppress the
        # notification check.
        if: always() && github.event_name == 'schedule'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_URL}" || -z "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "Skipping bot-challenge notification (no Supabase secrets)." >&2
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from supabase import create_client

          url = os.environ["SUPABASE_URL"]
          key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          repo = os.environ["REPO"]

          client = create_client(url, key)
          try:
              rows = client.table("bot_challenged_documents").select("*").execute().data or []
          except Exception as exc:
              # View may not be deployed yet (e.g., migration pending).
              # Fail silently so the cron doesn't error.
              print(f"bot_challenged_documents query failed: {exc}", file=sys.stderr)
              sys.exit(0)
          if not rows:
              print("No bot-challenged documents.")
              sys.exit(0)
          print(f"Found {len(rows)} bot-challenged document(s); checking issues...")
          minted = 0
          for row in rows:
              school = row.get("school_id") or "?"
              year = row.get("cds_year") or "?"
              title = f"bot_challenge: {school} {year} — manual upload required"
              # Dedup: skip if any open issue with this exact title exists.
              search = subprocess.run(
                  [
                      "gh", "issue", "list",
                      "--repo", repo,
                      "--state", "open",
                      "--search", f'in:title "{title}"',
                      "--json", "number,title",
                  ],
                  capture_output=True, text=True, check=False,
              )
              if search.returncode == 0:
                  try:
                      existing = json.loads(search.stdout or "[]")
                  except json.JSONDecodeError:
                      existing = []
                  if any(item.get("title") == title for item in existing):
                      continue
              # Mint a new issue with structured details so the operator
              # can act without re-discovering context.
              source_url = row.get("source_url") or "(no source url)"
              waf_outcome = row.get("last_outcome") or "bot_challenge"
              last_error = row.get("last_error") or "(no error string)"
              last_at = row.get("last_challenge_at") or "(unknown)"
              body = (
                  f"School `{school}` year `{year}` is blocked behind a WAF.\n\n"
                  f"- Outcome: `{waf_outcome}`\n"
                  f"- Source URL: {source_url}\n"
                  f"- Last challenge at: {last_at}\n"
                  f"- Provenance: {row.get('source_provenance') or 'school_direct'}\n"
                  f"- Last error: `{last_error}`\n\n"
                  "## Manual upload\n\n"
                  "1. Download the PDF/XLSX from the source URL in your browser.\n"
                  "2. Add it to `tools/finder/manual_urls.yaml` under "
                  f"`{school}.manual_urls` (or use whichever manual-upload "
                  "flow the project standardizes on).\n"
                  "3. Run the manual archive flow against that entry.\n"
                  "4. Close this issue when the row's "
                  "`extraction_status` is no longer `failed`.\n\n"
                  "_Auto-generated by `.github/workflows/ops-extraction-worker.yml` "
                  "from `public.bot_challenged_documents`._"
              )
              create = subprocess.run(
                  [
                      "gh", "issue", "create",
                      "--repo", repo,
                      "--title", title,
                      "--body", body,
                      "--label", "bot_challenge,archiver",
                  ],
                  capture_output=True, text=True, check=False,
              )
              if create.returncode == 0:
                  minted += 1
                  print(f"Minted issue: {title}")
              else:
                  # Don't fail the run; missing labels or repo permissions
                  # shouldn't block the cron.
                  print(
                      f"Issue create failed for {title}: "
                      f"{create.stderr.strip() or create.stdout.strip()}",
                      file=sys.stderr,
                  )
          print(f"Minted {minted} new issue(s).")
          PY
